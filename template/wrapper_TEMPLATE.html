<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilan Mensuel VIVESCIA — {{mois_label}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Reset minimal global ────────────────────────────────────────────── */
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; }
    body {
      font-family: 'Raleway', system-ui, -apple-system, sans-serif;
      background: #BEBEBE;
      color: #1A2530;
      line-height: 1.5;
    }

    /* ── Print / PDF : 1 page A4 par .page ───────────────────────────────── */
    @media print {
      body { background: #fff; }
      .prv { background: #fff !important; padding: 0 !important; }
      .page {
        margin: 0 !important;
        box-shadow: none !important;
        page-break-after: always;
      }
      .page:last-child { page-break-after: auto; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════
     PARTIE 1 — VIVESCIA Corporate (vivescia.com)
═══════════════════════════════════════════════════════════════════════════ -->
{{partie_1}}

<!-- ═══════════════════════════════════════════════════════════════════════
     PARTIE 2 — MyVIVESCIA (intranet)
═══════════════════════════════════════════════════════════════════════════ -->
{{partie_2}}

<!-- ═══════════════════════════════════════════════════════════════════════
     PARTIE 3 — Arterre (extranet + applications mobiles)
═══════════════════════════════════════════════════════════════════════════ -->
{{partie_3}}

<!-- ═══════════════════════════════════════════════════════════════════════
     PAGINATION DYNAMIQUE — v4 (gère les 2 structures de footer)
     - Corporate : <span>Page 1 / 21</span>
     - Arterre/MyV : <span>Page <span data-ph="page_num">{{page_num}}</span> 
                      / <span data-ph="total_pages">{{total_pages}}</span></span>
     Numérote dans l'ordre d'apparition dans le DOM, peu importe la structure.
═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function(){
  function applyPagination(){
    // ── 1. Collecte des marqueurs de pagination dans l'ordre du DOM ──
    var markers = [];

    // Type A : <span data-ph="page_num"> (Arterre/MyV)
    document.querySelectorAll('[data-ph="page_num"]').forEach(function(el){
      markers.push({ type: 'data_ph', element: el });
    });

    // Type B : <span> feuille (sans children span) dont le texte commence par "Page" et contient "/"
    document.querySelectorAll('span').forEach(function(span){
      // Skip si déjà géré via data-ph
      if (span.hasAttribute('data-ph')) return;
      // Skip si span parent (contient un autre span)
      if (span.querySelector('span')) return;
      var txt = (span.textContent || '').trim();
      if (/^Page\b/i.test(txt) && txt.indexOf('/') !== -1) {
        markers.push({ type: 'span_complete', element: span });
      }
    });

    // ── 2. Tri par ordre d'apparition dans le DOM ──
    markers.sort(function(a, b){
      var pos = a.element.compareDocumentPosition(b.element);
      if (pos & Node.DOCUMENT_POSITION_FOLLOWING) return -1;
      if (pos & Node.DOCUMENT_POSITION_PRECEDING) return 1;
      return 0;
    });

    var total = markers.length;
    if (total === 0) return;

    // ── 3. Réécriture ──
    markers.forEach(function(m, idx){
      var pageNum = idx + 1;
      if (m.type === 'data_ph') {
        m.element.textContent = pageNum;
      } else {
        m.element.textContent = 'Page ' + pageNum + ' / ' + total;
      }
    });

    // ── 4. Tous les <span data-ph="total_pages"> reçoivent le total ──
    document.querySelectorAll('[data-ph="total_pages"]').forEach(function(el){
      el.textContent = total;
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyPagination);
  } else {
    applyPagination();
  }
  window.addEventListener('load', applyPagination);
})();
</script>

</body>
</html>
