<!-- ═══════════════════════════════════════════════════════════════════════
     PAGINATION DYNAMIQUE — v3 (Bug #4 robuste)
     Scanne TOUS les <span> du document et repère ceux dont le texte 
     correspond au pattern de pagination (Corporate, MyV, Arterre confondus,
     peu importe leurs classes). Numérote dans l'ordre d'apparition.
═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function(){
  function applyPagination(){
    // Repère tous les <span> dont le texte commence par "Page" et contient "/"
    var spans = document.querySelectorAll('span');
    var pagSpans = [];
    spans.forEach(function(span){
      // On ignore les span qui contiennent eux-mêmes des span (parent)
      // Garde uniquement les "feuilles" textuelles
      if (span.querySelector('span')) return;
      var txt = (span.textContent || '').trim();
      // Pattern accepté : "Page X / Y", "Page {{page_num}} / {{total_pages}}", etc.
      if (/^Page\b/i.test(txt) && txt.indexOf('/') !== -1) {
        pagSpans.push(span);
      }
    });
    var total = pagSpans.length;
    if (total === 0) return;
    pagSpans.forEach(function(span, idx){
      span.textContent = 'Page ' + (idx + 1) + ' / ' + total;
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyPagination);
  } else {
    applyPagination();
  }
  window.addEventListener('load', applyPagination);
})();
</script>

</body>
