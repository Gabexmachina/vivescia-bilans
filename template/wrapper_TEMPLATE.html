<!-- ═══════════════════════════════════════════════════════════════════════
     PAGINATION DYNAMIQUE — Bug #4 fix (Session 14)
     Réécrit le footer "Page X / Y" de chaque .page en se basant
     sur sa position réelle dans le DOM. Gère 3 cas :
       - Footer Corporate avec chiffres en dur ("Page 9 / 10")
       - Footer MyV/Arterre avec placeholders ("Page {{page_num}} / {{total_pages}}")
       - Footer custom (tout span dont le texte commence par "Page ")
═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function(){
  function applyPagination(){
    var pages = document.querySelectorAll('.page');
    var total = pages.length;
    if (total === 0) return;
    pages.forEach(function(page, idx){
      var pageNum = idx + 1;
      // Cherche le footer .pf de cette page
      var pf = page.querySelector('.pf');
      if (!pf) return;
      // Parcours les <span> du footer, repère celui qui contient "Page"
      var spans = pf.querySelectorAll('span');
      spans.forEach(function(span){
        var txt = (span.textContent || '').trim();
        // Match : "Page N / M", "Page {{page_num}} / {{total_pages}}", etc.
        if (/^Page\b/i.test(txt) && txt.indexOf('/') !== -1) {
          span.textContent = 'Page ' + pageNum + ' / ' + total;
        }
      });
    });
  }
  // Run au DOMContentLoaded ET après load (au cas où les fragments injectés
  // arrivent en async / les images modifient la hauteur des pages)
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyPagination);
  } else {
    applyPagination();
  }
  window.addEventListener('load', applyPagination);
})();
</script>

</body>
