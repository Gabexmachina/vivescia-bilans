<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ─────────────────────────────────────────────────────────────
       Reset minimal global
    ────────────────────────────────────────────────────────────── */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Raleway', system-ui, -apple-system, sans-serif;
      background: #BEBEBE;
      color: #1A2530;
      line-height: 1.5;
    }

    /* ─────────────────────────────────────────────────────────────
       PRINT / PDF — v13 (Session 15)

       v13 vs v12 :
       FIX 9 RÉVISÉ — Arterre contraste sans casser le titre
         → v12 utilisait [data-arterre-app-card="true"] * qui forçait TOUTES les couleurs
           dans la card, y compris le titre "ARTERRE IOS"/"ARTERRE ANDROID" qui est
           en blanc sur fond marron foncé sur la page 26 → titre devenait invisible.
         → v13 : ciblage chirurgical par TEXTE EXACT des 4 libellés
           (UTILISATEURS / VISITES / DURÉE MOYENNE / PAGES VUES) uniquement.
           Le titre du bloc, les valeurs, les variations restent intacts.

       FIX 10 NOUVEAU — Alignement vertical KPI MyV Détails
         → Bug pré-existant rendu visible par v12 (footer transparent expose le bas).
         → Cause : .kpi-row utilise un flex sans largeurs fixes. Les libellés ont des
           longueurs textuelles différentes ("Utilisateurs" 12c, "Visites" 7c,
           "Pages par visite" 16c) → les valeurs et variations qui suivent se
           positionnent à des distances horizontales différentes selon la ligne.
         → Fix : grid 3 colonnes fixes sur .kpi-row → alignement parfait.

       v12 (préservé hors Fix 9) : FIX 5 footer transparent + FIX 6 compactage MyV
         + FIX 7 compactage kw-tbl + FIX 8 JS page-break Top 11
       v11 préservé : FIX 4 compactage MyV cards .be
       v10 préservé : FIX 1 (G ligatures) + FIX 3 (F espaces \u202F)
       v9  préservé : @page A4, .page strict, print-color-adjust

       Bugs encore non adressés (Phase 3+) :
       - A1 (CAMPAGNES) : template HTML Corporate v3 nécessaire
       - C  (MyV Consultation page 17) : sous-pipeline MyV v13
       - D  (placeholders Analyse4/5/7/10/16/19) : Code Inject Data
       - H  (emojis cassés page 8) : remplacer par SVG
       - Pagination 25→26
       - L,M (charts MyV/Arterre labels) : sous-pipelines
    ────────────────────────────────────────────────────────────── */
    @page { size: A4; margin: 0; }

    @media print {
      body {
        background: #fff !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      .prv { background: #fff !important; padding: 0 !important; }

      .page {
        width: 210mm !important;
        height: 297mm !important;
        margin: 0 !important;
        box-shadow: none !important;
        overflow: hidden !important;
        page-break-after: always;
        break-after: page;
      }
      .page:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      /* Force l'impression des fonds colorés (KPI cards, badges, donuts...) */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Évite la coupure des tableaux et blocs structurés en milieu de page */
      table, .tbl-section, .stra-tbl-wrap, .stra-block, .kpi, .chart-card, .sb {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      /* Cache les boutons d'export éventuels présents dans certains fragments */
      .no-print-btn, .no-print { display: none !important; }

      /* ───── v10 FIX 1 : Désactivation ligatures Raleway (Bug G) ───── */
      body, body *, .page, .page *, .pf, .pf * {
        font-variant-ligatures: none !important;
        font-feature-settings: "liga" 0, "clig" 0, "calt" 0 !important;
        -webkit-font-feature-settings: "liga" 0, "clig" 0, "calt" 0 !important;
        text-rendering: optimizeSpeed !important;
      }

      /* ───── v12 FIX 5 : Footer TRANSPARENT (suppression background blanc + ::before) ───── */
      /*
         v10/v11 avait : background:#fff !important + ::before { height:16px; background:#fff }
         qui masquait le contenu débordant. Validé par Gabriel : on enlève cette bande blanche.
         Le contenu débordant chevauchera visuellement le footer mais restera lisible.
         Le z-index est conservé pour que le texte du footer reste prioritaire en cas de chevauchement.
      */
      .page .pf {
        background: transparent !important;
        z-index: 100 !important;
      }
      /* Pas de ::before tampon en v12 (supprimé). */

      /* ───── v12 FIX 6 : Compactage MyV Détails plus offensif ───── */
      .be {
        margin-bottom: 4px !important;
      }
      .be .be-kpis .kpi-row {
        line-height: 1.2 !important;
        margin: 0 !important;
        /* ─── v13 FIX 10 : Alignement vertical des valeurs et variations ─── */
        /* Grid 3 colonnes fixes : libellé | valeur | variation
           Cible la structure attendue :
             <div class="kpi-row">
               <span class="kpi-l">Utilisateurs</span>
               <span class="kpi-v">47</span>
               <span class="pl3 ...">+11,9% ↑</span>
             </div>
           110px réservés au libellé (suffisant pour "Pages par visite")
            70px réservés à la valeur (jusqu'à "100 000")
            1fr  pour la variation (alignée à gauche dans sa cellule) */
        display: grid !important;
        grid-template-columns: 110px 70px 1fr !important;
        align-items: baseline !important;
        column-gap: 4px !important;
      }
      .be .be-kpis .kpi-l {
        font-size: 9px !important;
      }
      .be .be-kpis .kpi-v {
        font-size: 12.5px !important;
      }
      .be .be-right .actu-header {
        margin-bottom: 3px !important;
      }
      .be .be-right .actu-title {
        font-size: 10px !important;
      }
      .be .be-right .pages-vues-label {
        font-size: 8.5px !important;
      }
      .be .actu-list .acr {
        line-height: 1.25 !important;
        margin: 1px 0 !important;
        padding-top: 0 !important;
        padding-bottom: 0 !important;
      }
      .be .actu-list .act,
      .be .actu-list .acn {
        font-size: 9px !important;
      }
      .be .actu-list .acv {
        font-size: 10px !important;
      }

      /* ───── v12 FIX 7 : Compactage mots-clés thématiques Corporate (Bug A3) ───── */
      /*
         Ciblé sur la page SEO Évolution & Top Mots-Clés (page 8 du bilan).
         La thématique "Groupe VIVESCIA" a 13 mots-clés et la 13e ligne dépassait.
         Compactage CSS uniquement, classes exactes du Code Inject Corporate v3.6.
      */
      .kw-tbl-section {
        break-inside: avoid;
        page-break-inside: avoid;
      }
      .kw-tbl-hdr {
        padding: 6px 10px !important;
      }
      .kw-tbl-title {
        font-size: 10.5px !important;
      }
      .kw-tbl-badge {
        font-size: 9px !important;
      }
      .kw-tbl thead th {
        font-size: 9px !important;

      .kw-tbl tbody tr {

        padding: 2px 6px !important;

      }
      .kw-tbl .t-num {

      }
      .kw-tbl .t-val {
        font-size: 9.5px !important;
      }
      .kw-name {
        font-size: 9.5px !important;
      }
    }
  </style>

<!-- ═══════════════════════════════════════════════════════════════════════
     PAGINATION DYNAMIQUE — v8 (INCHANGÉE)
═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function(){
  var isApplying = false;

  function applyPagination(){
    if (isApplying) return;
    isApplying = true;
    try {
      var markers = [];
      document.querySelectorAll('[data-ph="page_num"]').forEach(function(el){
        markers.push({ type: 'data_ph', element: el });
      });
      document.querySelectorAll('.pf span').forEach(function(span){
        if (span.hasAttribute('data-ph')) return;
        if (span.querySelector('span')) return;
        var txt = (span.textContent || '').trim();
        if (/\d+\s*\/\s*\d+\s*$/.test(txt) || /^Page\b/i.test(txt)) {
          markers.push({ type: 'span_complete', element: span });
        }
      });
      markers.sort(function(a, b){
        var pos = a.element.compareDocumentPosition(b.element);
        if (pos & Node.DOCUMENT_POSITION_FOLLOWING) return -1;
        if (pos & Node.DOCUMENT_POSITION_PRECEDING) return 1;
        return 0;
      });
      var total = markers.length;
      if (total === 0) return;
      markers.forEach(function(m, idx){
        var pageNum = idx + 1;
        var newText = (m.type === 'data_ph') 
          ? String(pageNum)
          : 'Page ' + pageNum + ' / ' + total;
        m.element.setAttribute('data-pag-applied', pageNum);
        m.element.textContent = newText;
      });
      document.querySelectorAll('[data-ph="total_pages"]').forEach(function(el){
        el.setAttribute('data-pag-applied', total);
        el.textContent = String(total);
      });
    } finally {
      isApplying = false;
    }
  }

  function scheduleAll(){
    applyPagination();
    setTimeout(applyPagination, 200);
    setTimeout(applyPagination, 800);
    setTimeout(applyPagination, 2000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', scheduleAll);
  } else {
    scheduleAll();
  }
  window.addEventListener('load', scheduleAll);

  var observerActivated = false;
  function activateObserver(){
    if (observerActivated) return;
    observerActivated = true;
    var observer = new MutationObserver(function(mutations){
      if (isApplying) return;
      for (var i = 0; i < mutations.length; i++) {
        var m = mutations[i];
        if (m.type === 'characterData' || m.type === 'childList') {
          var target = m.target;
          if ((target.parentElement && target.parentElement.hasAttribute && target.parentElement.hasAttribute('data-ph')) ||
              (target.hasAttribute && target.hasAttribute('data-ph'))) {
            applyPagination();
            return;
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true, characterData: true });
  }
  setTimeout(activateObserver, 2500);
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     v10 FIX 3 : Remplacement des espaces fines insécables (\u202F)  (Bug F)
═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function(){
  function replaceNarrowNoBreakSpace(){
    var walker = document.createTreeWalker(
      document.body,
      NodeFilter.SHOW_TEXT,
      null,
      false
    );
    var node;
    var count = 0;
    while ((node = walker.nextNode())) {
      if (node.nodeValue && node.nodeValue.indexOf('\u202F') !== -1) {
        node.nodeValue = node.nodeValue.replace(/\u202F/g, '\u00A0');
        count++;
      }
    }
    if (window.console && count > 0) {
      console.log('[wrapper v12] U+202F → U+00A0 replaced in ' + count + ' text nodes');
    }
  }
  function scheduleReplace(){
    replaceNarrowNoBreakSpace();
    setTimeout(replaceNarrowNoBreakSpace, 500);
    setTimeout(replaceNarrowNoBreakSpace, 1500);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', scheduleReplace);
  } else {
    scheduleReplace();
  }
  window.addEventListener('load', scheduleReplace);
  window.addEventListener('beforeprint', replaceNarrowNoBreakSpace);
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     v12 FIX 8 : Page-break forcé avant Top 11 actu Corporate  (Bug A2 — page 6)
     ─────────────────────────────────────────────────────────────────────
     Détecte le titre "TOP 11 ACTUALITES VUES" via texte (robuste, ne dépend pas
     de classes CSS), trouve son conteneur parent (la section), et lui injecte
     un style page-break-before:always.
     Effet : Top 11 démarre sur sa propre page → aucune ligne perdue.
     Bilan passe de 26 à 27 pages.
═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function(){
  function forcePageBreakTop11(){
    // Cherche tous les éléments contenant le texte exact (ou similaire) "TOP 11 ACTUALITES"
    // Insensible à la casse, tolérant aux espaces.
    var allElements = document.querySelectorAll('h1, h2, h3, h4, .tbl-title, [class*="title"], [class*="hdr"]');
    var matched = null;
    var pattern = /TOP\s*11\s*ACTUALIT/i;
    for (var i = 0; i < allElements.length; i++) {
      var el = allElements[i];
      var txt = (el.textContent || '').trim();
      if (pattern.test(txt) && txt.length < 200) {
        matched = el;
        break;
      }
    }
    if (!matched) {
      // Fallback : recherche large dans tous les éléments
      var all = document.querySelectorAll('div, section, article, header');
      for (var j = 0; j < all.length; j++) {
        var t = (all[j].textContent || '').trim();
        // Match seulement si l'élément a le texte mais que ses enfants directs ne l'ont pas tous
        // → c'est un titre, pas un conteneur qui englobe tout
        if (pattern.test(t) && t.length < 80) {
          matched = all[j];
          break;
        }
      }
    }
    if (!matched) {
      if (window.console) console.warn('[wrapper v12] Top 11 title not found — page-break not applied');
      return;
    }
    // Remonte aux ancêtres jusqu'à trouver un conteneur "section" raisonnable.
    // On cherche le parent direct qui contient le tableau Top 11.
    var container = matched;
    // Remonte de 2-3 niveaux pour englober le titre + la table
    for (var k = 0; k < 4; k++) {
      if (container.parentElement) {
        var parent = container.parentElement;
        // Si le parent contient un <table> ou si c'est un .page/.pf, on s'arrête
        var hasTable = parent.querySelector('table');
        if (hasTable && parent.textContent.length > matched.textContent.length * 2) {
          container = parent;
          break;
        }
        container = parent;
      }
    }
    container.style.pageBreakBefore = 'always';
    container.style.breakBefore = 'page';
    if (window.console) console.log('[wrapper v12] Top 11 page-break applied');
  }

  function scheduleTop11Break(){
    forcePageBreakTop11();
    setTimeout(forcePageBreakTop11, 1000);
    setTimeout(forcePageBreakTop11, 2500);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', scheduleTop11Break);
  } else {
    scheduleTop11Break();
  }
  window.addEventListener('load', scheduleTop11Break);
  window.addEventListener('beforeprint', forcePageBreakTop11);
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     v13 FIX 9 RÉVISÉ : Lisibilité KPI Arterre iOS / Android  (Bug K — page 22)
     ─────────────────────────────────────────────────────────────────────
     v12 utilisait un sélecteur [data-arterre-app-card="true"] * qui forçait
     TOUTES les couleurs des cards Arterre, y compris le titre "ARTERRE IOS"
     en blanc sur fond marron foncé page 26 → titre devenait invisible.
     
     v13 : ciblage CHIRURGICAL par texte exact des 4 libellés
     (UTILISATEURS / VISITES / DURÉE MOYENNE / PAGES VUES). On marque
     uniquement ces 8 éléments précis (4 libellés × 2 cards iOS+Android),
     sans toucher au titre, aux valeurs, aux variations.
═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function(){
  var styleApplied = false;

  function fixArterreLabelsContrast(){
    if (styleApplied) return;
    
    // Étape 1 : trouve les blocs Apps mobiles via leur titre "ARTERRE IOS" / "ARTERRE ANDROID"
    var titlePattern = /^\s*(ARTERRE\s+(IOS|ANDROID))\s*$/i;
    var titleNodes = [];
    var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
    var node;
    while ((node = walker.nextNode())) {
      var txt = (node.nodeValue || '').trim();
      if (titlePattern.test(txt)) {
        titleNodes.push(node.parentElement);
      }
    }
    
    if (titleNodes.length === 0) {
      if (window.console) console.warn('[wrapper v13] Arterre IOS/Android titles not found');
      return;
    }
    
    // Étape 2 : pour chaque titre, remonte à la card englobante (qui contient les KPI)
    var arterreCards = [];
    titleNodes.forEach(function(titleEl){
      var card = titleEl;
      for (var i = 0; i < 6; i++) {
        if (card.parentElement) {
          card = card.parentElement;
          // Card identifiée si elle contient les 4 libellés KPI
          if (card.textContent && /UTILISATEURS/i.test(card.textContent) && /VISITES/i.test(card.textContent)) {
            arterreCards.push(card);
            break;
          }
        }
      }
    });
    
    if (arterreCards.length === 0) {
      if (window.console) console.warn('[wrapper v13] Arterre app cards not identified');
      return;
    }
    
    // Étape 3 : DANS ces cards uniquement, trouve les libellés KPI par TEXTE EXACT
    // et marque-les avec un attribut. Le titre "ARTERRE IOS" et les valeurs ne sont PAS marqués.
    var labelPattern = /^\s*(UTILISATEURS|VISITES|DUR[ÉE]E\s+MOYENNE|PAGES\s+VUES)\s*$/i;
    var markedLabels = 0;
    
    arterreCards.forEach(function(card){
      var w = document.createTreeWalker(card, NodeFilter.SHOW_TEXT, null, false);
      var n;
      while ((n = w.nextNode())) {
        var txt = (n.nodeValue || '').trim();
        if (labelPattern.test(txt) && n.parentElement) {
          n.parentElement.setAttribute('data-arterre-kpi-label', 'true');
          markedLabels++;
        }
      }
    });
    
    if (markedLabels === 0) {
      if (window.console) console.warn('[wrapper v13] No Arterre KPI labels matched');
      return;
    }
    
    // Étape 4 : injecte un style print qui ne touche QUE les libellés marqués
    var styleEl = document.createElement('style');
    styleEl.setAttribute('data-wrapper-v13', 'arterre-contrast');
    styleEl.textContent = '@media print {' +
      '  [data-arterre-kpi-label="true"] {' +
      '    color: #1A1A1A !important;' +
      '    opacity: 1 !important;' +
      '    font-weight: 600 !important;' +
      '  }' +
      '}';
    document.head.appendChild(styleEl);
    styleApplied = true;
    if (window.console) console.log('[wrapper v13] Arterre contrast fix applied to ' + markedLabels + ' KPI label(s) across ' + arterreCards.length + ' card(s)');
  }
  
  function scheduleArterreContrast(){
    fixArterreLabelsContrast();
    setTimeout(fixArterreLabelsContrast, 1000);
    setTimeout(fixArterreLabelsContrast, 2500);
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', scheduleArterreContrast);
  } else {
    scheduleArterreContrast();
  }
  window.addEventListener('load', scheduleArterreContrast);
  window.addEventListener('beforeprint', fixArterreLabelsContrast);
})();
</script>

</body>
