  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ─────────────────────────────────────────────────────────────
       Reset minimal global
    ────────────────────────────────────────────────────────────── */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Raleway', system-ui, -apple-system, sans-serif;
      background: #BEBEBE;
      color: #1A2530;
      line-height: 1.5;
    }

    /* ─────────────────────────────────────────────────────────────
       PRINT / PDF — v11 (Session 15)

       v11 vs v10 :
       NOUVEAU FIX 4 : Compactage cards Détails performances MyV (Pages 18-20 du bilan)
         → 4 cards .be par page débordent systématiquement → le 4e bloc était masqué
           par le footer opaque introduit en v10.
         → Stratégie défensive : réduire line-height + margin uniquement, en print only.
         → Browser inchangé. Effet : ~5-8mm gagnés par card × 4 = ~25mm libérés par page.

       v10 vs v9 (rappel) :
       - FIX 1 (G) : ligatures Raleway désactivées en print → "Offres", "réaffirmer", "différence" propres
       - FIX 2 (A1/B1/B2) : footer opaque + zone tampon → fin du chevauchement visuel
       - FIX 3 (F) : remplacement \u202F → \u00A0 → espaces fines bien rendues en PDF Chrome

       v9 (inchangé) :
       - @page { size: A4; margin: 0 }
       - .page strict 210x297mm + overflow:hidden + page-break-after:always
       - print-color-adjust: exact
       - break-inside: avoid sur tableaux et blocs structurés
    ────────────────────────────────────────────────────────────── */
    @page { size: A4; margin: 0; }

    @media print {
      body {
        background: #fff !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      .prv { background: #fff !important; padding: 0 !important; }

      .page {
        width: 210mm !important;
        height: 297mm !important;
        margin: 0 !important;
        box-shadow: none !important;
        overflow: hidden !important;
        page-break-after: always;
        break-after: page;
      }
      .page:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      /* Force l'impression des fonds colorés (KPI cards, badges, donuts...) */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Évite la coupure des tableaux et blocs structurés en milieu de page */
      table, .tbl-section, .stra-tbl-wrap, .stra-block, .kpi, .chart-card, .sb {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      /* Cache les boutons d'export éventuels présents dans certains fragments */
      .no-print-btn, .no-print { display: none !important; }

      /* ───── v10 FIX 1 : Désactivation ligatures Raleway (Bug G) ───── */
      body, body *, .page, .page *, .pf, .pf * {
        font-variant-ligatures: none !important;
        font-feature-settings: "liga" 0, "clig" 0, "calt" 0 !important;
        -webkit-font-feature-settings: "liga" 0, "clig" 0, "calt" 0 !important;
        text-rendering: optimizeSpeed !important;
      }

      /* ───── v10 FIX 2 : Footer opaque + zone tampon (Bug A1, B1, B2) ───── */
      .page .pf {
        background: #fff !important;
        z-index: 100 !important;
      }
      .page .pf::before {
        content: '';
        position: absolute;
        bottom: 100%;
        left: -32px;
        right: -32px;
        height: 16px;
        background: #fff;
        z-index: 99;
        pointer-events: none;
      }

      /* ───── v11 FIX 4 : Compactage cards Détails MyV (Bug pages 18-19-20) ───── */
      /*
        Architecture des cards .be (sous-pipeline MyV v13) :
          .be (card entreprise)
          ├── .be-left  : .be-logo (img + .be-vsl) + .be-kpis (3 × .kpi-row)
          └── .be-right : .actu-header (.actu-title + .pages-vues-label) + .actu-list (5 × .acr)

        Stratégie : compacter line-height et margin (gains mécaniques sans risque),
        + très légère réduction font-size sur titres et libellés secondaires.
        Aucune modification des valeurs principales (.kpi-v, .acv) pour préserver
        la lisibilité des chiffres clés.
      */

      /* Card globale : marge réduite entre cards */
      .be {
        margin-bottom: 6px !important;
      }

      /* KPIs colonne gauche : compactage vertical des 3 lignes */
      .be .be-kpis .kpi-row {
        line-height: 1.25 !important;
        margin: 1px 0 !important;
      }
      .be .be-kpis .kpi-l {
        font-size: 9.5px !important;
      }

      /* Header Top 5 : marge réduite */
      .be .be-right .actu-header {
        margin-bottom: 4px !important;
      }
      .be .be-right .actu-title {
        font-size: 10.5px !important;
      }
      .be .be-right .pages-vues-label {
        font-size: 9px !important;
      }

      /* Liste Top 5 actus : compactage vertical des 5 lignes */
      .be .actu-list .acr {
        line-height: 1.3 !important;
        margin: 1.5px 0 !important;
        padding-top: 1px !important;
        padding-bottom: 1px !important;
      }
      .be .actu-list .act,
      .be .actu-list .acn {
        font-size: 9.5px !important;
      }
    }
  </style>
</head>

<!-- ═══════════════════════════════════════════════════════════════════════
     PAGINATION DYNAMIQUE — v8 (INCHANGÉE)
     Stratégie :
     - data-ph="page_num" et data-ph="total_pages" -> pris PARTOUT (pour Arterre)
     - <span> feuilles avec "X / Y" ou "Page X" -> pris SEULEMENT dans .pf 
       (pour ne pas écraser des badges de section comme ".stra-section-hdr-badge")
     - Tri par ordre d'apparition dans le DOM
     - Application multiple + MutationObserver
═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function(){
  var isApplying = false;

  function applyPagination(){
    if (isApplying) return;
    isApplying = true;
    try {
      var markers = [];

      // Type A : <span data-ph="page_num"> -> partout
      document.querySelectorAll('[data-ph="page_num"]').forEach(function(el){
        markers.push({ type: 'data_ph', element: el });
      });

      // Type B : <span> feuille dans .pf qui contient un pattern de pagination
      document.querySelectorAll('.pf span').forEach(function(span){
        if (span.hasAttribute('data-ph')) return;
        if (span.querySelector('span')) return;
        var txt = (span.textContent || '').trim();
        // "Page X / Y", "Analyse stratégique X / Y", "Page X" (cover sans /)
        if (/\d+\s*\/\s*\d+\s*$/.test(txt) || /^Page\b/i.test(txt)) {
          markers.push({ type: 'span_complete', element: span });
        }
      });

      // Tri par ordre d'apparition dans le DOM
      markers.sort(function(a, b){
        var pos = a.element.compareDocumentPosition(b.element);
        if (pos & Node.DOCUMENT_POSITION_FOLLOWING) return -1;
        if (pos & Node.DOCUMENT_POSITION_PRECEDING) return 1;
        return 0;
      });

      var total = markers.length;
      if (total === 0) return;

      markers.forEach(function(m, idx){
        var pageNum = idx + 1;
        var newText = (m.type === 'data_ph') 
          ? String(pageNum)
          : 'Page ' + pageNum + ' / ' + total;
        m.element.setAttribute('data-pag-applied', pageNum);
        m.element.textContent = newText;
      });

      // total_pages partout (pas restreint à .pf)
      document.querySelectorAll('[data-ph="total_pages"]').forEach(function(el){
        el.setAttribute('data-pag-applied', total);
        el.textContent = String(total);
      });
    } finally {
      isApplying = false;
    }
  }

  function scheduleAll(){
    applyPagination();
    setTimeout(applyPagination, 200);
    setTimeout(applyPagination, 800);
    setTimeout(applyPagination, 2000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', scheduleAll);
  } else {
    scheduleAll();
  }
  window.addEventListener('load', scheduleAll);

  var observerActivated = false;
  function activateObserver(){
    if (observerActivated) return;
    observerActivated = true;
    var observer = new MutationObserver(function(mutations){
      if (isApplying) return;
      for (var i = 0; i < mutations.length; i++) {
        var m = mutations[i];
        if (m.type === 'characterData' || m.type === 'childList') {
          var target = m.target;
          if ((target.parentElement && target.parentElement.hasAttribute && target.parentElement.hasAttribute('data-ph')) ||
              (target.hasAttribute && target.hasAttribute('data-ph'))) {
            applyPagination();
            return;
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true, characterData: true });
  }
  setTimeout(activateObserver, 2500);
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     v10 FIX 3 : Remplacement des espaces fines insécables (\u202F)  (Bug F)
     ─────────────────────────────────────────────────────────────────────
     Pourquoi : les sous-pipelines injectent les nombres avec U+202F (NARROW
     NO-BREAK SPACE) entre les groupes de milliers ("84\u202f466"). Ce
     caractère est correctement rendu en browser mais Chrome PDF print le
     supprime ou le rend zéro-largeur dans certaines configs → "84466".
     
     Fix : remplacement DOM de tous les U+202F par U+00A0 (NO-BREAK SPACE
     classique) qui est universellement bien rendu.
     
     Idempotent : peut être appelé plusieurs fois sans dommage.
     Performance : ~5-10ms sur le DOM complet (~26 pages).
═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function(){
  function replaceNarrowNoBreakSpace(){
    var walker = document.createTreeWalker(
      document.body,
      NodeFilter.SHOW_TEXT,
      null,
      false
    );
    var node;
    var count = 0;
    while ((node = walker.nextNode())) {
      if (node.nodeValue && node.nodeValue.indexOf('\u202F') !== -1) {
        node.nodeValue = node.nodeValue.replace(/\u202F/g, '\u00A0');
        count++;
      }
    }
    if (window.console && count > 0) {
      console.log('[wrapper v11] U+202F → U+00A0 replaced in ' + count + ' text nodes');
    }
  }

  function scheduleReplace(){
    replaceNarrowNoBreakSpace();
    setTimeout(replaceNarrowNoBreakSpace, 500);
    setTimeout(replaceNarrowNoBreakSpace, 1500);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', scheduleReplace);
  } else {
    scheduleReplace();
  }
  window.addEventListener('load', scheduleReplace);
  // Avant impression : un dernier passage pour les contenus injectés tardivement
  window.addEventListener('beforeprint', replaceNarrowNoBreakSpace);
})();
</script>
