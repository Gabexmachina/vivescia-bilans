    /* ── Reset minimal global ────────────────────────────────────────────── */

    body {
      font-family: 'Raleway', system-ui, -apple-system, sans-serif;

      body { background: #fff; }
      .prv { background: #fff !important; padding: 0 !important; }
      .page {
        margin: 0 !important;
        box-shadow: none !important;
        page-break-after: always;
      }
      .page:last-child { page-break-after: auto; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════
     PAGINATION DYNAMIQUE — v5 (résiste aux scripts internes des fragments)
     Stratégie : exécuter applyPagination() à plusieurs moments pour avoir
     le dernier mot face aux scripts internes éventuels (ex: Arterre).
     - DOMContentLoaded
     - window.load
     - +200ms / +800ms / +2000ms après load (pour battre les setTimeout)
     - MutationObserver pour réagir aux modifs externes
═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function(){
  var isApplying = false; // guard pour éviter récursion infinie via MutationObserver

  function applyPagination(){
    if (isApplying) return;
    isApplying = true;
    try {
      // ── 1. Collecte des marqueurs ──
      var markers = [];

      // Type A : <span data-ph="page_num">
      document.querySelectorAll('[data-ph="page_num"]').forEach(function(el){
        markers.push({ type: 'data_ph', element: el });
      });

      // Type B : <span> feuille avec "Page X / Y" complet
      document.querySelectorAll('span').forEach(function(span){
        if (span.hasAttribute('data-ph')) return;
        if (span.querySelector('span')) return;
        var txt = (span.textContent || '').trim();
        if (/^Page\b/i.test(txt) && txt.indexOf('/') !== -1) {
          markers.push({ type: 'span_complete', element: span });
        }
      });

      // ── 2. Tri par ordre d'apparition dans le DOM ──
      markers.sort(function(a, b){
        var pos = a.element.compareDocumentPosition(b.element);
        if (pos & Node.DOCUMENT_POSITION_FOLLOWING) return -1;
        if (pos & Node.DOCUMENT_POSITION_PRECEDING) return 1;
        return 0;
      });

      var total = markers.length;
      if (total === 0) return;

      // ── 3. Réécriture ──
      markers.forEach(function(m, idx){
        var pageNum = idx + 1;
        var newText = (m.type === 'data_ph') 
          ? String(pageNum)
          : 'Page ' + pageNum + ' / ' + total;
        // Marque pour identifier ce qu'on a écrit (utilisé pour ignorer notre propre modif côté observer)
        m.element.setAttribute('data-pag-applied', pageNum);
        m.element.textContent = newText;
      });

      // ── 4. Tous les <span data-ph="total_pages"> ──
      document.querySelectorAll('[data-ph="total_pages"]').forEach(function(el){
        el.setAttribute('data-pag-applied', total);
        el.textContent = String(total);
      });
    } finally {
      isApplying = false;
    }
  }

  // ── Application multiple pour battre les scripts internes ──
  function scheduleAll(){
    applyPagination();
    setTimeout(applyPagination, 200);
    setTimeout(applyPagination, 800);
    setTimeout(applyPagination, 2000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', scheduleAll);
  } else {
    scheduleAll();
  }
  window.addEventListener('load', scheduleAll);

  // ── MutationObserver : si quelqu'un re-modifie les éléments paginés, on réapplique ──
  var observerActivated = false;
  function activateObserver(){
    if (observerActivated) return;
    observerActivated = true;
    var observer = new MutationObserver(function(mutations){
      if (isApplying) return;
      // Si un text node de pagination est modifié, on re-applique
      for (var i = 0; i < mutations.length; i++) {
        var m = mutations[i];
        if (m.type === 'characterData' || m.type === 'childList') {
          var target = m.target;
          // Détection : parent ou self a data-ph ?
          if ((target.parentElement && target.parentElement.hasAttribute && target.parentElement.hasAttribute('data-ph')) ||
              (target.hasAttribute && target.hasAttribute('data-ph'))) {
            applyPagination();
            return;
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true, characterData: true });
  }
  setTimeout(activateObserver, 2500); // active après les premières applications
})();
</script>

</body>
</html>
